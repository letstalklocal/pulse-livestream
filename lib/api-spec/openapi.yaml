openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agora
    description: Agora token operations
  - name: streams
    description: Live stream management
  - name: users
    description: User profile management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /agora/token:
    post:
      operationId: generateAgoraToken
      tags: [agora]
      summary: Generate Agora RTC token
      description: Generates a token for joining a live stream channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgoraTokenRequest"
      responses:
        "200":
          description: Token generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgoraTokenResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /streams:
    get:
      operationId: listStreams
      tags: [streams]
      summary: List active live streams
      description: Returns all currently active live streams
      responses:
        "200":
          description: List of active streams
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamListResponse"

    post:
      operationId: createStream
      tags: [streams]
      summary: Start a new live stream
      description: Register a new live stream session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStreamRequest"
      responses:
        "201":
          description: Stream created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /streams/{channelId}:
    get:
      operationId: getStream
      tags: [streams]
      summary: Get stream details
      description: Returns details of a specific live stream
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stream details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamResponse"
        "404":
          description: Stream not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: endStream
      tags: [streams]
      summary: End a live stream
      description: Mark a stream as ended and remove it from active streams
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stream ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Stream not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{uid}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertUser
      tags: [users]
      summary: Create or update user profile
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertUserRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /users/{uid}/follow:
    post:
      operationId: followUser
      tags: [users]
      summary: Follow a user
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowRequest"
      responses:
        "200":
          description: Now following
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "409":
          description: Already following
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unfollowUser
      tags: [users]
      summary: Unfollow a user
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowRequest"
      responses:
        "200":
          description: Unfollowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not following
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{uid}/follow-status:
    get:
      operationId: getFollowStatus
      tags: [users]
      summary: Check if a user is following another
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: integer
        - name: followerUid
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Follow status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowStatusResponse"

  /users/{uid}/streams:
    get:
      operationId: getUserStreams
      tags: [users]
      summary: Get stream history for a user
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stream history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamHistoryResponse"

  /streams/{channelId}/heartbeat:
    post:
      operationId: heartbeatStream
      tags: [streams]
      summary: Broadcaster heartbeat
      description: Called periodically by the broadcaster to keep the stream alive. Streams that miss heartbeats are automatically removed.
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Stream not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /streams/{channelId}/viewers:
    post:
      operationId: updateViewerCount
      tags: [streams]
      summary: Update viewer count
      description: Increment or decrement viewer count for a stream
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ViewerUpdateRequest"
      responses:
        "200":
          description: Viewer count updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamResponse"
        "404":
          description: Stream not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AgoraTokenRequest:
      type: object
      properties:
        channelName:
          type: string
          description: The name of the channel to join
        uid:
          type: integer
          description: User ID (0 for auto-assign)
        role:
          type: string
          enum: [broadcaster, audience]
          description: User role in the channel
      required:
        - channelName
        - uid
        - role

    AgoraTokenResponse:
      type: object
      properties:
        token:
          type: string
          description: The RTC token
        appId:
          type: string
          description: The Agora App ID
        channelName:
          type: string
        uid:
          type: integer
        expiresAt:
          type: integer
          description: Token expiry timestamp (Unix seconds)
      required:
        - token
        - appId
        - channelName
        - uid
        - expiresAt

    Stream:
      type: object
      properties:
        channelId:
          type: string
        hostUid:
          type: integer
        hostName:
          type: string
        title:
          type: string
        viewerCount:
          type: integer
        startedAt:
          type: string
          format: date-time
        category:
          type: string
      required:
        - channelId
        - hostUid
        - hostName
        - title
        - viewerCount
        - startedAt
        - category

    StreamListResponse:
      type: object
      properties:
        streams:
          type: array
          items:
            $ref: "#/components/schemas/Stream"
      required:
        - streams

    StreamResponse:
      type: object
      properties:
        stream:
          $ref: "#/components/schemas/Stream"
      required:
        - stream

    CreateStreamRequest:
      type: object
      properties:
        channelId:
          type: string
        hostUid:
          type: integer
        hostName:
          type: string
        title:
          type: string
        category:
          type: string
      required:
        - channelId
        - hostUid
        - hostName
        - title
        - category

    ViewerUpdateRequest:
      type: object
      properties:
        action:
          type: string
          enum: [join, leave]
      required:
        - action

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UserProfile:
      type: object
      properties:
        uid:
          type: integer
        name:
          type: string
        bio:
          type: string
        followersCount:
          type: integer
        followingCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - uid
        - name
        - bio
        - followersCount
        - followingCount
        - createdAt
        - updatedAt

    UserResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - user

    UpsertUserRequest:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
      required:
        - name

    StreamHistoryItem:
      type: object
      properties:
        id:
          type: integer
        channelId:
          type: string
        hostUid:
          type: integer
        hostName:
          type: string
        title:
          type: string
        category:
          type: string
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        peakViewers:
          type: integer
      required:
        - id
        - channelId
        - hostUid
        - hostName
        - title
        - category
        - startedAt
        - peakViewers

    FollowRequest:
      type: object
      properties:
        followerUid:
          type: integer
      required:
        - followerUid

    FollowStatusResponse:
      type: object
      properties:
        isFollowing:
          type: boolean
      required:
        - isFollowing

    StreamHistoryResponse:
      type: object
      properties:
        streams:
          type: array
          items:
            $ref: "#/components/schemas/StreamHistoryItem"
      required:
        - streams
